<DOCTYPE html>
    <html>
        <head>
<link rel="stylesheet" href="style.css"/>
        </head>
        <body>
            <div class="google-form">
            <div>
                <p>Google Form</p>
            <label class="full-name">Full Name</label>
            <input type="text" placeholder="Enter your name" class="enter-your-name"/>
            </div>
            <div>
                 <label class="email">Email</label>
            <input type="text" placeholder="Enter your email" class="enter-your-email"/>
            </div>
            <div>
                <label class="feed-back">Feedback</label>
                <input type="text" placeholder="Write your feedback" class="write-your-feedback"/>

            </div>
            <p><b>Rate this form</b></p>
            <input type="radio" id="Good" value="good"/>
            <label class="good">Good</label>
            <input type="radio" id="average" value="average"/>
            <label class="average">Average</label>
            <input type="radio" id="poor" value="poor"/>
            <label class="poor">Poor</label>
        <div>
<button class="submit">Submit</button>
</div>
</div>
            
        </body>
    </html>
