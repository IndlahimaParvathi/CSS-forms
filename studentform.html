<DOCTYPE html>
<html>
    <head>
<link rel="stylesheet" href="style1.css"/>
    </head>
    <body>
        <div class="hima"/>
        <div class="login-block">
            <p class="register-form">2.Students register form</p>
            <div>
                <label class="student-name">Student Name</label>
                <input type="text" placeholder="Student name" class="student-a"/>
            </div>
            <div>
                <label class="roll-number">Roll number</label>
                <input type="text" placeholder="Roll number" class="roll-a"/>
            </div>
            <div>
                <label class="class">Class</label>
                <input type="text" placeholder="class" class="class-a"/>
             </div>
             <div>
                <label class="date-of-birth">Date of birth</label>
                <input type="dd-mm-yy" placeholder="dd-mm-yy" required class="dateofbirth-a"/>
                
             </div>
             <div>
                <label class="phone">Phone</label>
                <input type="text" placeholder="phone number" class="phone-a"/>
             </div>
             <div>
                <label class="address">Address</label>
                <input type="text" placeholder="Address" class="address-a"/>
             </div>
             <div>
                <button class="register-button">Register</button>
             </div>
        </div>
    </body>
</html>
